<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElifNexus - Portfolyo</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-fluid py-5 min-vh-100 d-flex align-items-center justify-content-center background-pattern">
        <div class="container main-container">
            <div class="row g-4 flex-md-row-reverse">
                
                <!-- Sağ Kısım: Profil -->
                <div class="col-md-4">
                    <div class="profile-card p-4 text-center glass-effect">
                        <div class="profile-img-container mb-3">
                            <img src="" alt="Profil Fotoğrafı" id="profileImage" class="img-fluid rounded-circle profile-img shadow">
                        </div>
                        <h2 class="fw-bold mb-1"><span id="profileName" class="text-gradient"></span> <span id="profileSurname"></span></h2>
                        <p class="text-muted small mb-4" id="profileBio"></p>
                        
                        <div class="social-links d-flex justify-content-center gap-3" id="socialContainer">
                            <!-- Sosyal medya ikonları buraya dinamik olarak eklenecek -->
                        </div>
                    </div>
                </div>

                <!-- Sol/Orta Kısım: Projeler -->
                <div class="col-md-8">
                    <div class="projects-container p-4 glass-effect h-100">
                        <h3 class="mb-4 fw-bold border-bottom border-secondary pb-2">Projelerim</h3>
                        <div class="row g-3" id="projectsContainer">
                            <!-- Projeler buraya dinamik olarak eklenecek -->
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Data Configuration -->
    <script src="data.js"></script>
    <!-- Custom Script -->
    <script src="script.js"></script>
</body>
</html>
