<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElifNexus - Portfolyo</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="container-fluid py-5 min-vh-100 d-flex flex-column align-items-center justify-content-center background-pattern">
        
        <div class="container main-container flex-grow-1 d-flex align-items-center">
            <div class="row g-4 flex-md-row-reverse w-100">
                
                <!-- Sağ Kısım: Profil -->
                <div class="col-md-4">
                    <div class="profile-card p-4 text-center glass-effect position-relative">
                        <!-- Admin Düzenle Butonu (Gizli) -->
                        <button class="btn btn-sm btn-warning edit-btn admin-only d-none" data-edit-type="profile" title="Profili Düzenle"><i class="fas fa-edit"></i></button>
                        
                        <div class="profile-img-container mb-3">
                            <img src="https://via.placeholder.com/200" alt="Profil Fotoğrafı" id="profileImage" class="img-fluid rounded-circle profile-img shadow">
                        </div>
                        <h2 class="fw-bold mb-1"><span id="profileName" class="text-gradient">Yükleniyor...</span> <span id="profileSurname"></span></h2>
                        <p class="mb-4" id="profileBio" style="white-space: pre-wrap; color: #cbd5e1; font-size: 1rem; line-height: 1.6;">Lütfen bekleyin, veriler çekiliyor...</p>
                        
                        <!-- Sosyal Linkler Düzenle Butonu (Admin) -->
                        <button class="btn btn-sm btn-warning admin-only d-none mt-2" id="editSocialsBtn" title="Sosyal Medyayı Düzenle"><i class="fas fa-edit"></i> Linkleri Düzenle</button>
                        
                        <div class="social-links d-flex justify-content-center gap-3 mt-3" id="socialContainer">
                            <!-- Sosyal medya ikonları -->
                        </div>
                    </div>
                    
                    <!-- İletişim / Geri Bildirim Kartı -->
                    <div class="contact-card mt-4 p-3 text-center glass-effect position-relative" style="display:none;">
                        <h5 class="fw-bold mb-2 text-white">İletişim & Geri Bildirim</h5>
                        <p class="small mb-2" style="color: #cbd5e1;">Bana buradan ulaşabilirsiniz:</p>
                        <a href="#" id="profileEmailLink" class="text-decoration-none fw-bold text-gradient fs-5">
                            <i class="fas fa-envelope me-2"></i><span id="profileEmailText">Yükleniyor...</span>
                        </a>
                    </div>
                </div>

                <!-- Sol/Orta Kısım: Projeler -->
                <div class="col-md-8">
                    <div class="projects-container p-4 glass-effect h-100 position-relative">
                        <!-- Admin Düzenle Butonu (Gizli) -->
                        <button class="btn btn-sm btn-warning edit-btn admin-only d-none" data-edit-type="projects" title="Projeleri Düzenle"><i class="fas fa-edit"></i></button>

                        <h3 class="mb-4 fw-bold border-bottom border-secondary pb-2">Projelerim</h3>
                        <div class="row g-3" id="projectsContainer">
                            <!-- Projeler buraya dinamik eklenecek -->
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Footer / Admin Giriş Kilidi -->
        <div class="mt-5 text-center w-100 position-relative">
            <p class="text-muted mb-3"><small>&copy; 2026 ElifNexus</small></p>
            <button class="btn btn-danger px-4 py-2 rounded-pill shadow" id="adminLockBtn"><i class="fas fa-user-shield me-2"></i>Yönetici (Admin) Girişi</button>
            <button class="btn btn-outline-danger px-4 py-2 rounded-pill shadow d-none admin-only" id="adminLogoutBtn"><i class="fas fa-sign-out-alt me-2"></i>Çıkış Yap</button>
        </div>

    </div>

    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-dark">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-shield-alt text-primary"></i> Yönetici Girişi</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">E-posta</label>
                        <input type="email" id="adminEmail" class="form-control" placeholder="admin@ornek.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Şifre</label>
                        <input type="password" id="adminPassword" class="form-control" placeholder="••••••••">
                    </div>
                    <div id="loginError" class="text-danger small d-none">Giriş başarısız. Lütfen bilgileri kontrol edin.</div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary w-100" id="loginSubmitBtn">Giriş Yap</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal fade" id="editProfileModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-dark">
                <div class="modal-header">
                    <h5 class="modal-title">Profili Düzenle</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Ad</label>
                        <input type="text" id="editName" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Soyad</label>
                        <input type="text" id="editSurname" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Profil Fotoğrafı Seç</label>
                        <input type="file" id="editPhotoFile" accept="image/*" class="form-control">
                        <input type="hidden" id="currentPhotoUrl">
                        <div class="mt-2 text-center">
                            <img id="photoPreview" src="" alt="Önizleme" style="max-width: 100px; max-height: 100px; display: none; border-radius: 50%; object-fit: cover;">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Biyografi</label>
                        <textarea id="editBio" class="form-control" rows="4"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">İletişim (E-posta)</label>
                        <input type="email" id="editEmail" class="form-control" placeholder="ornek@mail.com">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success w-100" id="saveProfileBtn">Kaydet</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Socials Modal -->
    <div class="modal fade" id="editSocialsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-dark">
                <div class="modal-header">
                    <h5 class="modal-title">Sosyal Medya Linklerini Düzenle</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label"><i class="fab fa-linkedin text-primary"></i> LinkedIn Linki</label>
                        <input type="text" id="editSocialLinkedin" class="form-control" placeholder="https://linkedin.com/in/...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fab fa-github text-dark"></i> GitHub Linki</label>
                        <input type="text" id="editSocialGithub" class="form-control" placeholder="https://github.com/...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fab fa-kaggle text-info"></i> Kaggle Linki</label>
                        <input type="text" id="editSocialKaggle" class="form-control" placeholder="https://kaggle.com/...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fab fa-youtube text-danger"></i> YouTube Linki</label>
                        <input type="text" id="editSocialYoutube" class="form-control" placeholder="https://youtube.com/...">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success w-100" id="saveSocialsBtn">Kaydet</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Projects Modal -->
    <div class="modal fade" id="editProjectsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content text-dark">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-briefcase text-primary me-2"></i>Projeleri Düzenle</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="projectsEditContainer">
                        <!-- Proje formları buraya dinamik olarak eklenecek -->
                    </div>
                    <button type="button" class="btn btn-outline-primary btn-sm mt-3 w-100 fw-bold" id="addProjectBtn">
                        <i class="fas fa-plus"></i> Yeni Proje Ekle
                    </button>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success w-100" id="saveProjectsBtn">Projeleri Kaydet</button>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Eski Veriler (Sadece veritabanı boşken ilk yükleme için kullanılacak) -->
    <script src="data.js"></script>
    <!-- Custom Script -->
    <script src="script.js"></script>
</body>
</html>
